<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Slitting Planner</title>
    <link rel="icon" href="/favicon.ico" />
    <style>
      html, body {
        height: 100%;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
        background: #f6f7f9;
        color: #2b3d4f;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      img {
        width: 64px;
        height: 64px;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 8px;
      }
      p {
        font-size: 13px;
        color: #5b6b7a;
        max-width: 320px;
        margin: 0 0 20px;
      }
      button {
        border: none;
        background: #2b3d4f;
        color: #fff;
        padding: 10px 18px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img src="/pwa-192x192.png" alt="Tononoka Group" />
      <h1>You're offline</h1>
      <p>
        This page hasn't been loaded before, so it isn't available offline yet.
        Reconnect to the internet and try again — pages you've already visited
        will keep working without a connection.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
